<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ── -->
    <title>Ontara AI — Intelligence, Engineered</title>
    <meta name="description" content="Ontara AI designs and builds production-grade AI systems — autonomous agents, Text-to-SQL pipelines, intelligent dashboards, and workflow automation. Based in Bangalore, available worldwide." />
    <meta name="keywords" content="AI agents, LLM applications, Text-to-SQL, workflow automation, enterprise AI, AI development India, custom AI, LangGraph, LangChain" />
    <meta name="author" content="Ontara AI" />
    <link rel="canonical" href="https://www.ontaraai.solutions/" />

    <!-- ── Open Graph (controls how link looks on WhatsApp, LinkedIn, Slack etc.) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ontara AI" />
    <meta property="og:url" content="https://www.ontaraai.solutions/" />
    <meta property="og:title" content="Ontara AI — Intelligence, Engineered" />
    <meta property="og:description" content="We build production-grade AI systems that automate workflows, connect data, and deliver real business outcomes. Autonomous agents, Text-to-SQL, intelligent dashboards." />
    <meta property="og:image" content="https://www.ontaraai.solutions/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ontara AI — Intelligence, Engineered" />
    <meta name="twitter:description" content="Production-grade AI systems: autonomous agents, Text-to-SQL, intelligent dashboards, workflow automation." />
    <meta name="twitter:image" content="https://www.ontaraai.solutions/og-image.png" />

    <!-- ── Structured Data (JSON-LD) — makes Google show rich results ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Ontara AI",
      "url": "https://www.ontaraai.solutions",
      "logo": "https://www.ontaraai.solutions/favicon.svg",
      "description": "Ontara AI builds production-grade AI systems including autonomous agents, Text-to-SQL pipelines, intelligent dashboards, and workflow automation for businesses worldwide.",
      "email": "ontaraai@gmail.com",
      "foundingDate": "2025",
      "areaServed": "Worldwide",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bangalore",
        "addressCountry": "IN"
      },
      "sameAs": [
        "https://www.linkedin.com/company/ontaraai/"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "ontaraai@gmail.com",
        "contactType": "customer service"
      }
    }
    </script>

    <!-- ── Google Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
